<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazy Standard | Business Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Logo Styling */
        .logo-main {
            font-family: 'Playfair Display', serif;
            text-transform: uppercase;
            line-height: 0.8;
            letter-spacing: -0.05em;
            display: flex;
            flex-direction: column;
        }
        .logo-hazy {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            font-style: italic;
        }
        .logo-standard {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            margin-left: 1rem;
            position: relative;
            top: -0.1em;
        }
        /* Actieve menu-knop */
        .nav-link.active {
            background-color: black;
            color: white;
        }
    </style>
</head>
<body class="bg-white text-black font-sans antialiased">
    <div class="max-w-screen-2xl mx-auto border-x border-black min-h-screen flex flex-col">
        
        <header class="border-b border-black">
            <div class="flex justify-between items-start px-6 py-10 border-b border-black">
                <h1 class="logo-main">
                    <span class="logo-hazy">Hazy</span>
                    <span class="logo-standard">Standard.</span>
                </h1>
                <div class="text-xs font-semibold uppercase tracking-widest hidden sm:block pt-2" id="current-date"></div>
            </div>
            <nav class="flex flex-wrap overflow-x-auto border-black">
                <button class="nav-link active px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="home">Home</button>
                <button class="nav-link px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="portfolio">Portfolio</button>
                <button class="nav-link px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="topics">Onderwerpen</button>
                <button class="nav-link px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="about">About me</button>
                <button class="nav-link px-6 py-3 border-black font-semibold uppercase text-sm" data-target="contact">Contact</button>
            </nav>
        </header>

        <main id="main-content" class="flex-grow flex flex-col">
            </main>

        <footer class="border-t border-black p-4 flex justify-between items-center text-xs font-semibold uppercase">
            <span>&copy; 2026 Hazy Standard.</span>
            <span>Strikt Zakelijk / Alleen de feiten</span>
        </footer>
    </div>

    <template id="tpl-home">
        <div class="flex flex-col flex-grow">
            <div id="featured-container" class="border-b border-black grid grid-cols-1 md:grid-cols-3"></div>
            <div class="grid grid-cols-1 md:grid-cols-3 flex-grow">
                <div class="border-r border-black flex flex-col">
                    <div class="p-3 border-b border-black bg-black text-white font-bold uppercase text-sm">Video / Docu</div>
                    <div id="col-video" class="flex flex-col"></div>
                </div>
                <div class="border-r border-black flex flex-col">
                    <div class="p-3 border-b border-black bg-black text-white font-bold uppercase text-sm">Analysis / Blog</div>
                    <div id="col-analysis" class="flex flex-col"></div>
                </div>
                <div class="flex flex-col bg-gray-50">
                    <div class="p-3 border-b border-black bg-black text-white font-bold uppercase text-sm">Raw Data</div>
                    <div id="col-raw" class="flex flex-col p-4 space-y-4"></div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-topics">
        <div class="flex flex-col flex-grow bg-white">
            <div class="p-6 border-b border-black flex space-x-4 overflow-x-auto" id="topics-filters"></div>
            
            <div class="p-8 border-b border-black bg-gray-50 flex items-center justify-center">
                <div class="max-w-5xl w-full relative group overflow-hidden border border-black">
                    <img src="veldwerk-foto.jpg" class="w-full h-[400px] object-cover grayscale contrast-125 group-hover:grayscale-0 transition-all duration-1000" alt="Hazy Standard Research">
                    <div class="absolute bottom-6 left-6 bg-white p-4 border border-black shadow-2xl">
                        <p class="text-[10px] font-bold uppercase tracking-[0.2em]">Current Investigation</p>
                        <h2 class="text-xl font-extrabold uppercase mt-1">Data-integriteit in het veld</h2>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 p-8" id="topics-grid"></div>
        </div>
    </template>

    <template id="tpl-portfolio">
        <div class="bg-white min-h-screen">
            <div class="p-10 border-b border-black">
                <h1 class="text-4xl md:text-6xl font-extrabold uppercase leading-none mb-4 font-serif italic">Portfolio</h1>
                <p class="text-sm font-bold uppercase text-gray-400 tracking-widest">Gerealiseerde projecten & BI-analyses</p>
            </div>
            <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 p-8"></div>
        </div>
    </template>

    <template id="tpl-about">
        <div class="bg-black text-white min-h-screen">
            <div class="p-20 text-center">
                <h2 class="text-6xl font-extrabold uppercase">About Me</h2>
                <p class="mt-10 max-w-2xl mx-auto text-gray-400">Business Intelligence expert gericht op feitelijke rapportages en diepgaande veldanalyse.</p>
            </div>
        </div>
    </template>

    <template id="tpl-contact">
        <div class="bg-white p-20 min-h-screen">
            <h2 class="text-5xl font-extrabold uppercase border-b-4 border-black inline-block mb-10">Contact</h2>
            <p class="text-xl">Laten we bespreken wat de feiten voor uw organisatie betekenen.</p>
            <p class="mt-4 font-bold">info@hazystandard.nl</p>
        </div>
    </template>

    <script type="module" src="app.js"></script>
</body>
</html>
