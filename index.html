<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazy Standard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white text-black font-sans">
    <div class="max-w-screen-2xl mx-auto border-x border-black min-h-screen flex flex-col">
        
        <header class="border-b border-black p-6">
            <h1 class="text-4xl font-extrabold uppercase">Hazy Standard.</h1>
            <nav class="mt-6 flex border-t border-black">
                <button class="nav-link p-4 border-r border-black font-bold uppercase text-sm" data-target="home">Home</button>
                <button class="nav-link p-4 border-r border-black font-bold uppercase text-sm" data-target="Portfolio">Portfolio</button>
                <button class="nav-link p-4 border-r border-black font-bold uppercase text-sm" data-target="topics">Onderwerpen</button>
                <button class="nav-link p-4 border-r border-black font-bold uppercase text-sm" data-target="about">Over</button>
            </nav>
        </header>

        <main id="main-content" class="flex-grow flex flex-col">
            </main>

        <footer class="border-t border-black p-4 text-xs font-bold uppercase">
            © 2026 HAZY STANDARD
        </footer>
    </div>

    <template id="tpl-home">
        <div class="p-10">
            <div id="featured-container" class="grid grid-cols-1 md:grid-cols-2 gap-10">
                </div>
        </div>
    </template>

    <template id="tpl-Portfolio">
        <div class="p-10">
            <h2 class="text-3xl font-extrabold uppercase mb-6">Portfolio</h2>
            <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                </div>
        </div>
    </template>

    <template id="tpl-about">
        <div class="p-10">
            <h2 class="text-3xl font-extrabold uppercase">Over Hazy Standard</h2>
            <p class="mt-4 font-semibold">Strikte data-analyse en visuele rapportage.</p>
        </div>
    </template>

    <template id="tpl-topics">
        <div class="p-10">
            <h2 class="text-3xl font-extrabold uppercase">Onderwerpen</h2>
            <div id="topics-grid" class="grid grid-cols-1 gap-4 mt-6"></div>
        </div>
    </template>
    <script type="module" src="app.js"></script>
</body>
</html>
