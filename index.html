<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazy Standard | Business Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white text-black font-sans antialiased">
    <div class="max-w-screen-2xl mx-auto border-x border-black min-h-screen flex flex-col">
        <header class="border-b border-black">
            <div class="flex justify-between items-center px-4 py-6 border-b border-black">
                <h1 class="text-4xl font-extrabold uppercase tracking-tighter">Hazy Standard.</h1>
                <div class="text-xs font-semibold uppercase tracking-widest hidden sm:block" id="current-date"></div>
            </div>
            <nav class="flex flex-wrap overflow-x-auto border-black">
                <button class="nav-link active px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="home">Home</button>
                <button class="nav-link px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="portfolio">Portfolio</button>
                <button class="nav-link px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="topics">Onderwerpen</button>
                <button class="nav-link px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="about">About me</button>
                <button class="nav-link px-6 py-3 border-black font-semibold uppercase text-sm" data-target="contact">Contact</button>
            </nav>
        </header>

        <main id="main-content" class="flex-grow flex flex-col">
            </main>

        <footer class="border-t border-black p-4 flex justify-between items-center text-xs font-semibold uppercase">
            <span>&copy; 2026 Hazy Standard. Alle rechten voorbehouden.</span>
            <span>100% Monochroom / Strikt Zakelijk</span>
        </footer>
    </div>

    <template id="tpl-home">
        <div class="flex flex-col flex-grow">
            <div id="featured-container" class="border-b border-black grid grid-cols-1 md:grid-cols-3"></div>
            <div class="grid grid-cols-1 md:grid-cols-3 flex-grow">
                <div class="border-r border-black flex flex-col">
                    <div class="p-3 border-b border-black bg-black text-white font-bold uppercase text-sm">Video / Docu</div>
                    <div id="col-video" class="flex flex-col"></div>
                </div>
                <div class="border-r border-black flex flex-col">
                    <div class="p-3 border-b border-black bg-black text-white font-bold uppercase text-sm">Analysis / Blog</div>
                    <div id="col-analysis" class="flex flex-col"></div>
                </div>
                <div class="flex flex-col bg-gray-50">
                    <div class="p-3 border-b border-black bg-black text-white font-bold uppercase text-sm">Raw Data</div>
                    <div id="col-raw" class="flex flex-col p-4 space-y-4"></div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-topics">
        <div class="flex flex-col flex-grow">
            <div class="p-4 border-b border-black flex space-x-2 overflow-x-auto" id="topics-filters"></div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 p-8 border-b border-black" id="topics-grid"></div>
        </div>
    </template>

    <template id="tpl-about">
        <div class="bg-black text-white min-h-screen font-sans">
            <div class="relative flex items-end p-8 md:p-16 border-b border-white overflow-hidden">
                <div class="absolute inset-0 opacity-40 bg-[url('jouw-foto.jpg')] bg-cover bg-center grayscale"></div>
                <h1 class="relative z-10 text-[50px] md:text-[100px] font-extrabold uppercase leading-[0.75] tracking-tighter">
                    About <br>
                    <span class="italic font-serif font-normal lowercase tracking-normal text-gray-400">Me</span>
                </h1>
                <div class="absolute top-1/2 right-8 md:right-24 max-w-xs text-sm leading-tight font-medium">
                    <p class="font-serif italic text-lg mb-2">In 2024, I founded Hazy Standard.</p>
                    <p class="text-gray-400 uppercase text-[10px] tracking-widest">Business Intelligence / Documentatie</p>
                </div>
            </div>
            <div class="relative py-20 px-8 md:px-32">
                <div class="max-w-4xl">
                    <h2 class="text-4xl md:text-7xl font-extrabold uppercase leading-[0.9] mb-12">
                        Mijn portfolio inclusief <span class="font-serif italic font-normal text-gray-400 lowercase">uitgebreide</span> 
                        BI-analyses, data-audits en <span class="underline decoration-1 underline-offset-8">veldwerk rapportages.</span>
                    </h2>
                </div>
                <div class="md:ml-[50%] max-w-sm mt-12 border-t border-gray-800 pt-6">
                    <p class="text-sm leading-relaxed text-gray-400">
                        Elk project weerspiegelt een diepe drang naar feitelijkheid. Ik onderzoek de verbindingen tussen ruwe data en de fysieke realiteit, waarbij ik me focus op wat echt is, zonder ruis.
                    </p>
                </div>
            </div>
