<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazy Standard | Business Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Achtergrond over de hele site, achter het logo en menu */
        body {
            background-image: url('jouw-foto.jpg'); /* Vervang door je eigen bestandsnaam */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: black;
        }

        /* Styling voor het nieuwe logo */
        .logo-main {
            font-family: 'Playfair Display', serif;
            text-transform: uppercase;
            line-height: 0.8;
            letter-spacing: -0.05em;
            display: flex;
            flex-direction: column;
        }
        .logo-hazy {
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 900;
            font-style: italic;
        }
        .logo-standard {
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 900;
            margin-left: 1.5rem;
            position: relative;
            top: -0.1em;
        }

        /* Header en Nav transparant maken zodat de foto zichtbaar is */
        header, nav {
            background: transparent !important;
        }
        
        /* Zorg dat de container de lijnen behoudt maar de foto doorlaat */
        .main-container {
            background-color: rgba(255, 255, 255, 0.1); /* Zeer lichte glans over de foto */
            backdrop-filter: blur(2px); /* Optioneel: maakt tekst leesbaarder */
        }
    </style>
</head>
<body class="font-sans antialiased">
    <div class="max-w-screen-2xl mx-auto border-x border-black min-h-screen flex flex-col main-container">
        
        <header class="border-b border-black">
            <div class="flex justify-between items-start px-4 py-12 border-b border-black">
                <h1 class="logo-main">
                    <span class="logo-hazy">Hazy</span>
                    <span class="logo-standard">Standard.</span>
                </h1>
                <div class="text-xs font-semibold uppercase tracking-widest hidden sm:block pt-4" id="current-date"></div>
            </div>
            
            <nav class="flex flex-wrap overflow-x-auto border-black">
                <button class="nav-link active px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="home">Home</button>
                <button class="nav-link px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="portfolio">Portfolio</button>
                <button class="nav-link px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="topics">Onderwerpen</button>
                <button class="nav-link px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="about">About me</button>
                <button class="nav-link px-6 py-3 border-black font-semibold uppercase text-sm" data-target="contact">Contact</button>
            </nav>
        </header>

        <main id="main-content" class="flex-grow flex flex-col">
            </main>

        <footer class="border-t border-black p-4 flex justify-between items-center text-xs font-semibold uppercase bg-white/80">
            <span>&copy; 2026 Hazy Standard.</span>
            <span>Strikt Zakelijk — Alleen de feiten</span>
        </footer>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
