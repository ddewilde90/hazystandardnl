<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazy Standard | Business Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white text-black font-sans antialiased">
    <div class="max-w-screen-2xl mx-auto border-x border-black min-h-screen flex flex-col">
        <header class="border-b border-black">
            <div class="flex justify-between items-center px-4 py-6 border-b border-black">
                <h1 class="text-4xl font-extrabold uppercase tracking-tighter">Hazy Standard.</h1>
                <div class="text-xs font-semibold uppercase tracking-widest hidden sm:block" id="current-date"></div>
            </div>
            <nav class="flex flex-wrap overflow-x-auto border-black">
                <button class="nav-link active px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="home">Home</button>
                <button class="nav-link px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="portfolio">Portfolio</button>
                <button class="nav-link px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="topics">Verhalen</button>
                <button class="nav-link px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="about">About me</button>
                <button class="nav-link px-6 py-3 border-black font-semibold uppercase text-sm" data-target="contact">Contact</button>
            </nav>
        </header>

        <main id="main-content" class="flex-grow flex flex-col">
            </main>

        <footer class="border-t-4 border-black bg-white pt-16 pb-8 px-6 mt-auto">
            <div class="max-w-screen-xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-12">
                
                <div class="flex flex-col">
                    <h2 class="text-2xl font-black uppercase tracking-tighter mb-4">Hazy Standard.</h2>
                    <p class="text-sm font-semibold leading-relaxed mb-6">
                        Onafhankelijke Business Intelligence en veldwerk-rapportages. Wij zoeken de feiten achter de data.
                    </p>
                    <button class="bg-black text-white px-6 py-3 font-extrabold uppercase text-sm hover:bg-gray-800 transition-all self-start">
                        Steun ons & Doneer
                    </button>
                </div>

                <div>
                    <h4 class="font-black uppercase text-xs tracking-widest mb-6 border-b border-gray-200 pb-2">Over Hazy Standard</h4>
                    <ul class="space-y-3 text-sm font-bold uppercase">
                        <li><button class="hover:underline text-left" data-target="about">Onze Methode</button></li>
                        <li><button class="hover:underline text-left">Redactiestatuut</button></li>
                        <li><button class="hover:underline text-left" data-target="contact">Contact</button></li>
                        <li><button class="hover:underline text-left">FAQ</button></li>
                    </ul>
                </div>

                <div>
                    <h4 class="font-black uppercase text-xs tracking-widest mb-6 border-b border-gray-200 pb-2">Voorwaarden</h4>
                    <ul class="space-y-3 text-sm font-bold uppercase text-gray-500">
                        <li><button class="hover:underline text-left">Privacy Statement</button></li>
                        <li><button class="hover:underline text-left">Cookiebeleid</button></li>
                        <li><button class="hover:underline text-left">Algemene Voorwaarden</button></li>
                        <li><button class="hover:underline text-left">Disclaimer</button></li>
                    </ul>
                </div>

                <div>
                    <h4 class="font-black uppercase text-xs tracking-widest mb-6 border-b border-gray-200 pb-2">Volg de feiten</h4>
                    <div class="flex gap-4">
                        <a href="#" class="w-10 h-10 border border-black flex items-center justify-center hover:bg-black hover:text-white transition-all">
                            <i data-lucide="linkedin" class="w-5 h-5"></i>
                        </a>
                        <a href="#" class="w-10 h-10 border border-black flex items-center justify-center hover:bg-black hover:text-white transition-all">
                            <i data-lucide="twitter" class="w-5 h-5"></i>
                        </a>
                        <a href="#" class="w-10 h-10 border border-black flex items-center justify-center hover:bg-black hover:text-white transition-all">
                            <i data-lucide="instagram" class="w-5 h-5"></i>
                        </a>
                        <a href="#" class="w-10 h-10 border border-black flex items-center justify-center hover:bg-black hover:text-white transition-all">
                            <i data-lucide="facebook" class="w-5 h-5"></i>
                        </a>
                    </div>
                </div>
            </div>

            <div class="max-w-screen-xl mx-auto border-t border-gray-100 mt-16 pt-8 flex flex-col md:flex-row justify-between items-center text-[10px] font-bold uppercase tracking-widest text-gray-400">
                <span>&copy; 2026 Hazy Standard. Alle rechten voorbehouden.</span>
                <div class="flex gap-6 mt-4 md:mt-0">
                    <span>Strikt Zakelijk</span>
                    <span>100% Monochroom</span>
                </div>
            </div>
        </footer>
    </div>

    <template id="tpl-home">
        <div class="flex flex-col flex-grow">
            <div id="featured-container" class="border-b border-black grid grid-cols-1 md:grid-cols-3"></div>
            <div class="grid grid-cols-1 md:grid-cols-3 flex-grow">
                <div class="border-r border-black flex flex-col">
                    <div class="p-3 border-b border-black bg-black text-white font-bold uppercase text-sm">Video / Docu</div>
                    <div id="col-video" class="flex flex-col"></div>
                </div>
                <div class="border-r border-black flex flex-col">
                    <div class="p-3 border-b border-black bg-black text-white font-bold uppercase text-sm">Analysis / Blog</div>
                    <div id="col-analysis" class="flex flex-col"></div>
                </div>
                <div class="flex flex-col bg-gray-50">
                    <div class="p-3 border-b border-black bg-black text-white font-bold uppercase text-sm">Raw Data</div>
                    <div id="col-raw" class="flex flex-col p-4 space-y-4 border-b border-black"></div>
                    <div class="p-6 bg-white flex-grow">
                        <div id="home-ad-sidebar" class="border border-gray-300 h-full min-h-[250px] flex flex-col items-center justify-center p-4 text-center">
                            <span class="text-[10px] text-gray-300 font-bold uppercase">Ruimte voor advertentie</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-topics">
        <div class="flex flex-col flex-grow">
            <div class="p-4 border-b border-black flex space-x-2 overflow-x-auto bg-white" id="topics-filters"></div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 p-8" id="topics-grid"></div>
        </div>
    </template>

   <template id="tpl-about">
    <div class="bg-black text-white min-h-screen font-sans">
        <div class="relative flex items-end p-8 md:p-16 border-b border-white overflow-hidden h-[60vh]">
            <div class="absolute inset-0 opacity-40 bg-[url('https://images.unsplash.com/photo-1493612276216-ee3925520721?q=80&w=1200')] bg-cover bg-center grayscale"></div>
            
            <h1 class="relative z-10 text-[60px] md:text-[120px] font-extrabold uppercase leading-[0.75] tracking-tighter">
                Hazy <br>
                <span class="italic font-serif font-normal lowercase tracking-normal text-gray-400">Standard</span>
            </h1>
            
            <div class="absolute top-1/2 right-8 md:right-24 max-w-xs text-sm leading-tight font-medium">
                <p class="font-serif italic text-lg mb-2">Onafhankelijkheid, Kern en Verbinding.</p>
                <p class="text-gray-400 uppercase text-[10px] tracking-widest">Gevestigd in 2024 • Editorial Platform</p>
            </div>
        </div>

        <div class="relative py-20 px-8 md:px-32">
            <div class="max-w-4xl">
                <h2 class="text-4xl md:text-7xl font-extrabold uppercase leading-[0.9] mb-12">
                    In een wereld vol <span class="font-serif italic font-normal text-gray-400 lowercase">ruis</span>, 
                    kiest Hazy Standard voor de <span class="underline decoration-1 underline-offset-8">essentie.</span>
                </h2>
            </div>
            <div class="md:ml-[50%] max-w-sm mt-12 border-t border-gray-800 pt-6">
                <p class="text-sm leading-relaxed text-gray-400" id="about-mission-text">
                    Wij strippen de verpakking weg om tot de kern te komen. Hazy Standard biedt een zorgvuldige selectie van nieuws, documentaires en blogs die er echt toe doen.
                </p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 bg-white text-black py-20">
            <div class="md:col-start-2 md:col-span-4 p-8">
                <div class="aspect-[3/4] bg-gray-200 border border-black mb-6 grayscale overflow-hidden shadow-[10px_10px_0px_0px_rgba(0,0,0,1)]">
                    <img src="https://images.unsplash.com/photo-1507679799987-c73779587ccf?q=80&w=800" class="w-full h-full object-cover">
                </div>
            </div>
            <div class="md:col-start-6 md:col-span-6 flex flex-col justify-center p-8">
                <h3 class="text-xs uppercase tracking-[0.3em] font-bold mb-4 text-red-600">Daniëlle de Wilde — Oprichtster</h3>
                <h4 class="text-3xl md:text-6xl font-extrabold uppercase leading-[0.9] mb-8">
                    Informatie terug naar <span class="font-serif italic font-normal">de kern</span> van het pure verhaal.
                </h4>
                <p class="text-sm leading-relaxed mb-6">
                    Als drijvende kracht coördineert Daniëlle (1990) de volledige koers van Hazy Standard. Zij gelooft dat we alleen stevig in onze schoenen staan als we ruimte maken voor creativiteit, verbinding en — bovenal — bij onszelf blijven.
                </p>
                <div class="text-xs uppercase tracking-[0.3em] font-bold border-b-2 border-black pb-2 inline-block self-start">
                    The Hazy Standard Method
                </div>
            </div>
        </div>
    </div>
</template>

    <template id="tpl-contact">
        <div class="bg-white text-black min-h-screen flex flex-col font-sans">
            <div class="p-8 md:p-12 border-b border-black bg-black text-white">
                <h1 class="text-[50px] md:text-[100px] font-extrabold uppercase leading-[0.8] tracking-tighter">
                    Get in <br>
                    <span class="italic font-serif font-normal lowercase tracking-normal text-gray-400">Touch</span>
                </h1>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-12 flex-grow">
                <div class="md:col-span-4 p-8 md:p-12 border-r border-black flex flex-col justify-between bg-white">
                    <div>
                        <h2 class="text-2xl font-extrabold uppercase mb-6">Directe Lijnen.</h2>
                        <p class="font-serif italic text-lg text-gray-600 mb-8 leading-snug">
                            "Laten we bespreken wat de feiten voor uw organisatie betekenen."
                        </p>
                    </div>
                    <div class="space-y-6">
                        <div class="border-t border-black pt-4">
                            <span class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Email</span>
                            <p class="font-bold uppercase text-sm">info@hazystandard.nl</p>
                        </div>
                    </div>
                </div>
                <div class="md:col-span-8 p-8 md:p-16 bg-gray-50">
                    </div>
            </div>
        </div>
    </template>

    <template id="tpl-portfolio">
        <div class="bg-white min-h-screen">
            <div class="p-6 md:p-10 border-b border-black">
                <h1 class="text-4xl md:text-6xl font-extrabold uppercase leading-none mb-4">Portfolio</h1>
                <p class="text-lg font-bold uppercase text-gray-400">Gerealiseerde projecten & Business Intelligence</p>
            </div>
            <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3"></div>
        </div>
    </template>

    <script type="module" src="app.js"></script>
</body>
</html>
