<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazy Standard | Business Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white text-black font-sans antialiased">
    <div class="max-w-screen-2xl mx-auto border-x border-black min-h-screen flex flex-col">
        <!-- HEADER -->
        <header class="border-b border-black">
            <div class="flex justify-between items-center px-4 py-6 border-b border-black">
                <h1 class="text-4xl font-extrabold uppercase tracking-tighter">Hazy Standard.</h1>
                <div class="text-xs font-semibold uppercase tracking-widest hidden sm:block" id="current-date"></div>
            </div>
            <nav class="flex flex-wrap overflow-x-auto border-black">
                <button class="nav-link active px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="home">Home</button>
                <button class="nav-link px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="portfolio">Portfolio</button>
                <button class="nav-link px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="topics">Onderwerpen</button>
                <button class="nav-link px-6 py-3 border-r border-black font-semibold uppercase text-sm" data-target="about">Over Hazy Standard</button>
                <button class="nav-link px-6 py-3 border-black font-semibold uppercase text-sm" data-target="contact">Contact</button>
            </nav>
        </header>

        <!-- MAIN CONTENT -->
        <main id="main-content" class="flex-grow flex flex-col">
            <!-- VIEWS WILL BE INJECTED HERE -->
        </main>

        <!-- FOOTER -->
        <footer class="border-t border-black p-4 flex justify-between items-center text-xs font-semibold uppercase">
            <span>&copy; 2026 Hazy Standard. Alle rechten voorbehouden.</span>
            <span>100% Monochroom / Strikt Zakelijk</span>
        </footer>
    </div>

    <!-- TEMPLATES -->
    <template id="tpl-home">
        <div class="flex flex-col flex-grow">
            <!-- FEATURED -->
            <div id="featured-container" class="border-b border-black grid grid-cols-1 md:grid-cols-3">
                <!-- Injected via JS -->
            </div>
            <!-- 3 COLUMNS -->
            <div class="grid grid-cols-1 md:grid-cols-3 flex-grow">
                <!-- COL 1: Video -->
                <div class="border-r border-black flex flex-col">
                    <div class="p-3 border-b border-black bg-black text-white font-bold uppercase text-sm">Video / Docu</div>
                    <div id="col-video" class="flex flex-col"></div>
                </div>
                <!-- COL 2: Analysis -->
                <div class="border-r border-black flex flex-col">
                    <div class="p-3 border-b border-black bg-black text-white font-bold uppercase text-sm">Analysis / Blog</div>
                    <div id="col-analysis" class="flex flex-col"></div>
                </div>
                <!-- COL 3: Raw Data -->
                <div class="flex flex-col bg-gray-50">
                    <div class="p-3 border-b border-black bg-black text-white font-bold uppercase text-sm">Raw Data</div>
                    <div id="col-raw" class="flex flex-col p-4 space-y-4"></div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-topics">
        <div class="flex flex-col flex-grow">
            <div class="p-4 border-b border-black flex space-x-2 overflow-x-auto" id="topics-filters">
                <!-- Filters injected via JS -->
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 border-b border-black" id="topics-grid">
                <!-- Articles injected via JS -->
            </div>
        </div>
    </template>

    <template id="tpl-about">
    <div class="bg-black text-white min-h-screen flex flex-col">
        <div class="p-8 md:p-16 border-b border-white">
            <h1 class="text-[80px] md:text-[160px] font-extrabold uppercase leading-[0.8] tracking-tighter mb-4 text-huge">
                About <br><span class="italic font-serif font-normal lowercase tracking-normal text-gray-400">Me</span>
            </h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 border-b border-white">
            <div class="p-8 md:p-16 border-r border-white flex flex-col justify-center">
                <p class="font-serif italic text-2xl md:text-3xl mb-8 text-gray-300 leading-tight">
                    "In 2024 ben ik gestart vanuit een kernwaarde: feitelijkheid boven alles."
                </p>
                <p class="text-xs uppercase tracking-[0.2em] font-bold text-gray-500 mb-4">Mijn Achtergrond</p>
                <p class="text-xl leading-tight font-bold uppercase italic font-serif">
                    Mijn carrière in Business Intelligence is geworteld in de diepte van data-extractie. Waar anderen ruis zien, zoek ik de standaard.
                </p>
            </div>
            <div class="p-8 md:p-16 bg-white text-black flex flex-col justify-center">
                <h2 class="text-5xl font-extrabold uppercase leading-[0.9] mb-8 text-right">Analyse <br>(Studio)</h2>
                <p class="text-sm font-bold uppercase border-t-2 border-black pt-6 leading-relaxed">
                    Binnen de muren van de studio ontleden we ruwe data. Geen emotie, geen afleiding. Wij werken vanuit de kern: van binnen naar buiten.
                </p>
            </div>
        </div>

        <div class="p-8 md:p-24 border-b border-white bg-black">
            <p class="text-3xl md:text-6xl font-extrabold uppercase leading-[1.1] tracking-tight">
                Mijn portfolio bevat <span class="font-serif italic font-normal text-gray-500 lowercase">uitgebreide analyses</span> voor de financiële sector en <span class="underline decoration-1 underline-offset-8">vastgoed.</span>
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 flex-grow">
            <div class="p-8 md:p-16 border-r border-white bg-gray-900 flex flex-col justify-center">
                <h2 class="text-4xl font-extrabold uppercase leading-none mb-6">Rapportage <br><span class="text-gray-500">(Buiten)</span></h2>
                <p class="text-xl font-serif italic text-gray-400 leading-relaxed">
                    "De realiteit bevindt zich op straat. Wij documenteren de fysieke manifestatie van de data in rauwe zwart-wit beelden."
                </p>
            </div>
            <div class="p-8 md:p-16 flex flex-col justify-between bg-black relative">
                <div class="absolute inset-0 bg-gray-900 opacity-80 border-l border-white"></div>
                <div class="text-right relative">
                    <i data-lucide="info" class="inline-block w-12 h-12 text-gray-700"></i>
                </div>
                <div class="relative">
                    <p class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-4">De Methode</p>
                    <p class="text-2xl font-bold uppercase leading-tight">
                        Geen opsmuk, slechts de naakte waarheid zodat u nooit voor verrassingen komt te staan.
                    </p>
                </div>
            </div>
        </div>
    </div>
</template>

    <template id="tpl-contact">
        <div class="p-8 flex-grow flex items-center justify-center">
            <div class="w-full max-w-2xl border border-black p-8">
                <h2 class="text-3xl font-extrabold uppercase mb-6 border-b border-black pb-4">Zakelijke Aanvragen</h2>
                <form class="flex flex-col space-y-4" onsubmit="event.preventDefault(); alert('Verzonden.');">
                    <div class="flex flex-col">
                        <label class="font-bold uppercase text-sm mb-1">Naam / Organisatie</label>
                        <input type="text" class="border border-black p-3 rounded-none focus:outline-none focus:ring-2 focus:ring-black" required>
                    </div>
                    <div class="flex flex-col">
                        <label class="font-bold uppercase text-sm mb-1">Referentie / Doel</label>
                        <select class="border border-black p-3 rounded-none focus:outline-none focus:ring-2 focus:ring-black">
                            <option>Samenwerking</option>
                            <option>Data Aanvraag</option>
                            <option>Media Licentie</option>
                        </select>
                    </div>
                    <div class="flex flex-col">
                        <label class="font-bold uppercase text-sm mb-1">Toelichting</label>
                        <textarea rows="5" class="border border-black p-3 rounded-none focus:outline-none focus:ring-2 focus:ring-black" required></textarea>
                    </div>
                    <button type="submit" class="bg-black text-white font-bold uppercase py-4 hover:bg-white hover:text-black border border-black transition-none">Versturen</button>
                </form>
            </div>
        </div>
    </template>
 <template id="tpl-portfolio">
    <div class="bg-white min-h-screen">
        <div class="p-6 md:p-10 border-b border-black">
            <h1 class="text-4xl md:text-6xl font-extrabold uppercase leading-none mb-4">Portfolio</h1>
            <p class="text-lg font-bold uppercase text-gray-400">Gerealiseerde projecten & Business Intelligence</p>
        </div>
        <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
            </div>
    </div>
</template>

    <script type="module" src="app.js"></script>
</body>
</html>
